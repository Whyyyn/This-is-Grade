<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>This is Grade</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>This is Grade<span>.pages.dev</span></h1>
        </div>
        <div class="top-actions">
          <button id="themeToggleButton" class="icon-button" type="button" title="切换亮暗主题" aria-label="切换亮暗主题">
            <span>☾</span>
          </button>
          <button id="refreshButton" class="icon-button" title="重新抓取成绩" aria-label="重新抓取成绩">
            <span>↻</span>
          </button>
        </div>
      </section>

      <section class="workspace">
        <form id="scrapeForm" class="panel login-panel" method="post" autocomplete="on" action="/api/scrape">
          <div class="panel-head">
            <h2>WebTESS</h2>
            <span id="status" class="status">待连接</span>
          </div>
          <label>
            <span>enter account</span>
            <input id="email" name="email" type="email" autocomplete="username" inputmode="email" autocapitalize="none" spellcheck="false" placeholder="name@example.com" />
          </label>
          <label>
            <span>enter password</span>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="local only" />
          </label>
          <label>
            <span>website</span>
            <input id="url" name="webtess-url" type="url" autocomplete="url" value="https://harts.systems/webtess/parent.jsp" />
          </label>
          <button class="primary" type="submit">抓取并更新</button>
        </form>

        <section class="panel average-panel">
          <div class="panel-head">
            <h2>四科均分</h2>
            <span id="selectionCount" class="status">0 / 4</span>
          </div>
          <div class="average-value" id="averageValue">--</div>
          <p id="averageFormula" class="muted">选择四科后计算</p>
          <div id="subjectPicker" class="subject-picker"></div>
          <div class="layout-actions">
            <button id="copyLayoutButton" class="ghost compact" type="button">复制布局链接</button>
            <details class="layout-help">
              <summary>这是什么意思？</summary>
              <p>Safari 有时不会稳定记住你展示的四门课。这个功能会把当前展示课程写进网址里的 show 参数。复制或收藏这个链接，下次打开就会恢复同样的四门课。</p>
            </details>
          </div>
        </section>

        <section class="panel table-panel">
          <div class="panel-head">
            <h2>显示科目明细</h2>
            <button id="exportButton" class="ghost compact" type="button">导出 JSON</button>
          </div>
          <div class="table-wrap details-wrap">
            <table>
              <thead>
                <tr>
                  <th>科目</th>
                  <th>栏目</th>
                  <th>作业</th>
                  <th>得分</th>
                  <th>百分比</th>
                  <th>权重</th>
                </tr>
              </thead>
              <tbody id="gradeRows"></tbody>
            </table>
          </div>
        </section>

        <section class="panel prediction-panel">
          <div class="panel-head">
            <h2>成绩预测</h2>
            <span class="status">Preview</span>
          </div>
          <div class="predict-grid">
            <label>
              <span>科目</span>
              <select id="predictionCourse"></select>
            </label>
            <label>
              <span>栏目</span>
              <select id="predictionCategory"></select>
            </label>
            <label>
              <span>新成绩 %</span>
              <input id="predictionScore" type="number" min="0" max="120" step="0.1" value="100" />
            </label>
          </div>
          <div class="prediction-results">
            <div>
              <span>科目新分</span>
              <strong id="predictedCourse">--</strong>
            </div>
            <div>
              <span>四科均分</span>
              <strong id="predictedAverage">--</strong>
            </div>
          </div>
          <p id="predictionDelta" class="muted">等待成绩明细</p>
        </section>
      </section>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
</html>
